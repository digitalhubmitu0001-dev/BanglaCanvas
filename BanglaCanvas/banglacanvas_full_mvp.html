
<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bc-dark:#0A2318;--bc-green:#0F3D2E;--bc-mid:#1A6B3C;--bc-gold:#C8962E;
  --bc-gold-light:#E8B84A;--bc-cream:#FDF8F0;--bc-light:#E8F5EE;
}
#bc-app{display:flex;flex-direction:column;height:660px;border:0.5px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface-0)}

#bc-top{display:flex;align-items:center;gap:10px;padding:0 16px;height:50px;background:var(--bc-dark);flex-shrink:0}
.bc-logo{font-family:'Hind Siliguri',sans-serif;font-size:17px;font-weight:700;color:#fff}
.bc-logo em{color:var(--bc-gold);font-style:normal}
.bc-tagline{font-size:11px;color:rgba(255,255,255,0.4);font-family:'Hind Siliguri',sans-serif;border-left:1px solid rgba(255,255,255,0.15);padding-left:10px}
.bc-top-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.bc-search{background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.15);color:#fff;border-radius:6px;padding:5px 10px 5px 28px;font-size:12px;width:160px;font-family:'Hind Siliguri',sans-serif;outline:none}
.bc-search::placeholder{color:rgba(255,255,255,0.35)}
.bc-search-wrap{position:relative}
.bc-search-wrap i{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.4);font-size:13px}
.bc-pill{font-size:10px;padding:3px 8px;border-radius:10px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;border:0.5px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.05)}
.bc-pill.pro{background:var(--bc-gold);color:#fff;border-color:var(--bc-gold)}
/* BODY */
#bc-body{display:flex;flex:1;overflow:hidden}
/* SIDEBAR */
#bc-sidebar{width:200px;flex-shrink:0;background:var(--surface-1);border-right:0.5px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.bc-group-label{font-size:9px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;padding:10px 12px 4px;font-family:'Inter',sans-serif;position:sticky;top:0;background:var(--surface-1);z-index:1}
.bc-cat{display:flex;align-items:center;gap:6px;padding:5px 12px;cursor:pointer;border-left:2px solid transparent;font-family:'Hind Siliguri',sans-serif;font-size:13px;color:var(--text-secondary);transition:all 0.12s;line-height:1.3}
.bc-cat:hover{background:var(--surface-2);color:var(--text-primary)}
.bc-cat.active{border-left-color:var(--bc-gold);background:var(--surface-2);color:var(--text-primary);font-weight:600}
.bc-cat i{font-size:13px;color:var(--text-muted);width:16px;flex-shrink:0}
.bc-cat.active i{color:var(--bc-gold)}
.bc-cat-count{margin-left:auto;font-size:9px;color:var(--text-muted);font-family:'Inter',sans-serif;background:var(--surface-0);border-radius:8px;padding:1px 5px}
/* MAIN */
#bc-main{flex:1;display:flex;overflow:hidden}
/* GALLERY */
#bc-gallery{flex:1;overflow-y:auto;padding:14px}
.bc-gallery-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.bc-gallery-head h2{font-family:'Hind Siliguri',sans-serif;font-size:14px;font-weight:600;color:var(--text-primary)}
.bc-gallery-head span{font-size:11px;color:var(--text-muted)}
.bc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.bc-tcard{border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all 0.13s;aspect-ratio:0.72;position:relative}
.bc-tcard:hover{border-color:rgba(200,150,46,0.5);transform:translateY(-1px)}
.bc-tcard.sel{border-color:var(--bc-gold)}
.bc-tcard-inner{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 7px;gap:3px}
.bc-tcard-arabic{font-size:14px;opacity:0.85;line-height:1}
.bc-tcard-main{font-family:'Hind Siliguri',sans-serif;font-weight:700;text-align:center;line-height:1.2}
.bc-tcard-sub{font-family:'Hind Siliguri',sans-serif;text-align:center;opacity:0.65;line-height:1.2}
.bc-tcard-hover{position:absolute;inset:0;background:rgba(0,0,0,0.5);opacity:0;display:flex;align-items:center;justify-content:center;transition:opacity 0.12s;border-radius:6px}
.bc-tcard:hover .bc-tcard-hover{opacity:1}
.bc-tcard-hover span{color:#fff;font-size:10px;font-family:'Hind Siliguri',sans-serif;background:rgba(200,150,46,0.92);padding:3px 9px;border-radius:4px}

#bc-editor{width:260px;flex-shrink:0;border-left:0.5px solid var(--border);display:flex;flex-direction:column;background:var(--surface-1)}
.bc-ed-head{padding:10px 14px;border-bottom:0.5px solid var(--border);background:var(--surface-2)}
.bc-ed-head h3{font-family:'Hind Siliguri',sans-serif;font-size:13px;font-weight:600}
.bc-ed-head p{font-size:10px;color:var(--text-muted);margin-top:1px}
#bc-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--text-muted);text-align:center;padding:16px}
#bc-empty i{font-size:28px}
#bc-empty p{font-size:11px;font-family:'Hind Siliguri',sans-serif;line-height:1.5}
#bc-edform{display:none;flex-direction:column;flex:1;overflow:hidden}
#bc-preview{display:flex;align-items:center;justify-content:center;padding:14px;background:var(--surface-0);border-bottom:0.5px solid var(--border)}
#bc-pcard{width:120px;height:168px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 8px;gap:4px;box-shadow:0 2px 12px rgba(0,0,0,0.2)}
.bc-pc-arabic{font-size:18px;line-height:1}
.bc-pc-main{font-weight:700;text-align:center;line-height:1.2;font-size:12px}
.bc-pc-sub{font-size:8px;text-align:center;opacity:0.7;line-height:1.3}
.bc-pc-name{font-size:8px;text-align:center;opacity:0.55;margin-top:2px}
#bc-controls{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.bc-ctrl label{font-size:9px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.06em}
.bc-ctrl input[type=text]{width:100%;font-family:'Hind Siliguri',sans-serif;font-size:12px;padding:5px 8px;border:0.5px solid var(--border-strong);border-radius:5px;background:var(--surface-2);color:var(--text-primary);outline:none}
.bc-ctrl input[type=text]:focus{border-color:var(--bc-gold)}
.bc-divider{height:0.5px;background:var(--border);margin:2px 0}
.bc-font-section label{font-size:9px;font-weight:600;color:var(--text-muted);display:flex;align-items:center;gap:4px;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.06em}
.bc-font-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.bc-font-btn{padding:4px 6px;border-radius:4px;border:0.5px solid var(--border-strong);cursor:pointer;background:var(--surface-2);color:var(--text-secondary);font-size:10px;text-align:center;transition:all 0.11s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bc-font-btn.active{background:var(--bc-green);color:#fff;border-color:var(--bc-green)}
.bc-font-btn.pro-font{opacity:0.5;cursor:default;position:relative}
.bc-font-btn.pro-font::after{content:'PRO';position:absolute;top:1px;right:2px;font-size:7px;color:var(--bc-gold);font-weight:700}
.bc-font-upload{border:0.5px dashed var(--border-strong);border-radius:5px;padding:6px;text-align:center;cursor:pointer;color:var(--text-muted);font-size:10px;font-family:'Hind Siliguri',sans-serif;display:flex;align-items:center;justify-content:center;gap:4px;opacity:0.6}
.bc-font-upload:hover{opacity:1;border-color:var(--bc-gold)}
.bc-color-row{display:flex;gap:5px;flex-wrap:wrap}
.bc-cdot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.11s;flex-shrink:0}
.bc-cdot.active{border-color:var(--text-primary);transform:scale(1.2)}
.bc-size-row{display:flex;gap:4px}
.bc-size-btn{flex:1;padding:3px;border-radius:4px;border:0.5px solid var(--border-strong);cursor:pointer;background:var(--surface-2);color:var(--text-muted);font-size:9px;text-align:center;transition:all 0.11s}
.bc-size-btn.active{background:var(--bc-green);color:#fff;border-color:var(--bc-green)}
#bc-actions{padding:10px 14px;border-top:0.5px solid var(--border);display:flex;gap:6px}
.bc-dl-btn{flex:1;padding:8px;background:var(--bc-green);color:#fff;border:none;border-radius:6px;font-family:'Hind Siliguri',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.bc-dl-btn:hover{background:var(--bc-mid)}
.bc-save-btn{padding:8px 10px;background:var(--surface-2);color:var(--text-secondary);border:0.5px solid var(--border-strong);border-radius:6px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.bc-save-btn:hover{background:var(--surface-0)}
.bc-toast{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:var(--bc-green);color:#fff;padding:5px 14px;border-radius:12px;font-size:11px;font-family:'Hind Siliguri',sans-serif;display:none;z-index:99;white-space:nowrap}
.bc-pro-badge{font-size:8px;background:var(--bc-gold);color:#fff;padding:1px 4px;border-radius:3px;font-family:'Inter',sans-serif;font-weight:700;vertical-align:middle;margin-left:3px}

  return BG_VARIANTS.map((fn,i)=>({
    bg: fn(p),
    accent: i%2===0 ? p[1] : p[0],
    textColor: "#fff",
    arabic: seg.arabic,
    main: seg.main,
    sub: seg.sub,
    palIdx: seg.pal,
    variant: i,
  }));
}

function buildSidebar(){
  const sb = document.getElementById("bc-sidebar");
  sb.innerHTML = "";
  Object.entries(SEGMENTS).forEach(([grp, segs])=>{
    const lbl = document.createElement("div");
    lbl.className = "bc-group-label";
    lbl.textContent = grp;
    sb.appendChild(lbl);
    segs.forEach(seg=>{
      const item = document.createElement("div");
      item.className = "bc-cat" + (activeSeg && activeSeg.key===seg.key?" active":"");
      item.dataset.key = seg.key;
      item.dataset.grp = grp;
      item.innerHTML = `<i class="ti ${seg.icon}" aria-hidden="true"></i>${seg.label}<span class="bc-cat-count">10</span>`;
      item.addEventListener("click",()=>selectSeg(grp, seg, item));
      sb.appendChild(item);
    });
  });
}

function selectSeg(grp, seg, el){
  document.querySelectorAll(".bc-cat").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
  activeSeg = seg;
  selIdx = -1;
  renderGallery(seg);
}

function renderGallery(seg){
  const grid = document.getElementById("bc-grid");
  const title = document.getElementById("bc-cat-title");
  title.textContent = seg.label;
  document.getElementById("bc-cat-count").textContent = "10 templates";
  grid.innerHTML = "";
  const templates = getTemplates(null, seg);
  templates.forEach((t,i)=>{
    const card = document.createElement("div");
    card.className = "bc-tcard" + (selIdx===i?" sel":"");
    const fs = Math.min(12, Math.max(8, Math.floor(22/t.main.length)));
    card.innerHTML = `<div class="bc-tcard-inner" style="background:${t.bg}">
      ${t.arabic?`<div class="bc-tcard-arabic" style="color:${t.accent}">${t.arabic}</div>`:""}
      <div class="bc-tcard-main" style="color:${t.accent};font-size:${fs}px">${t.main}</div>
      <div class="bc-tcard-sub" style="color:#fff;font-size:8px">${t.sub}</div>
      <div class="bc-tcard-hover"><span>সম্পাদনা</span></div>
    </div>`;
    card.addEventListener("click",()=>{selIdx=i; renderGallery(seg); openEditor(t, i);});
    grid.appendChild(card);
  });
}

function openEditor(t, idx){
  document.getElementById("bc-empty").style.display = "none";
  const form = document.getElementById("bc-edform");
  form.style.display = "flex";
  document.getElementById("bc-ed-sub").textContent = activeSeg?.label||"";
  document.getElementById("ctrl-main").value = t.main;
  document.getElementById("ctrl-sub").value = t.sub;
  document.getElementById("ctrl-name").value = "";
  document.getElementById("ctrl-date").value = "";
  curPalIdx = t.palIdx;
  curFontIdx = 0;
  curSizeIdx = 0;
  renderColorPicker();
  renderFontPicker();
  renderSizePicker();
  updatePreview(t);
}

function updatePreview(tOverride){
  const t = tOverride || getCurrentTpl();
  if(!t) return;
  const p = PALETTES[curPalIdx];
  const bg = BG_VARIANTS[selIdx>=0?selIdx:0](p);
  const accent = p[1];
  const pc = document.getElementById("bc-pcard");
  pc.style.background = bg;
  const font = customFontName || FONTS[curFontIdx].name;
  pc.style.fontFamily = font;
  document.getElementById("pc-arabic").textContent = t.arabic||"";
  document.getElementById("pc-arabic").style.color = accent;
  document.getElementById("pc-main").textContent = document.getElementById("ctrl-main").value||t.main;
  document.getElementById("pc-main").style.color = accent;
  document.getElementById("pc-main").style.fontFamily = font;
  document.getElementById("pc-sub").textContent = document.getElementById("ctrl-sub").value||t.sub;
  document.getElementById("pc-sub").style.color = "#fff";
  const nm = document.getElementById("ctrl-name").value;
  const dt = document.getElementById("ctrl-date").value;
  document.getElementById("pc-name-disp").textContent = [nm,dt].filter(Boolean).join(" • ");
  document.getElementById("pc-name-disp").style.color = "rgba(255,255,255,0.6)";
}

function getCurrentTpl(){
  if(!activeSeg) return null;
  return getTemplates(null, activeSeg)[selIdx>=0?selIdx:0];
}

function renderColorPicker(){
  const row = document.getElementById("bc-colors");
  row.innerHTML = "";
  PALETTES.forEach((p,i)=>{
    const d = document.createElement("div");
    d.className = "bc-cdot" + (i===curPalIdx?" active":"");
    d.style.background = `linear-gradient(135deg,${p[0]} 50%,${p[1]} 50%)`;
    d.title = `রঙ ${i+1}`;
    d.addEventListener("click",()=>{curPalIdx=i; renderColorPicker(); updatePreview();});
    row.appendChild(d);
  });
}

function renderFontPicker(){
  const row = document.getElementById("bc-fonts");
  row.innerHTML = "";
  FONTS.forEach((f,i)=>{
    const b = document.createElement("div");
    const isPro = !f.free;
    b.className = "bc-font-btn" + (i===curFontIdx&&!customFontName?" active":"") + (isPro?" pro-font":"");
    b.textContent = f.label;
    b.style.fontFamily = f.free ? f.name : "inherit";
    b.title = isPro ? "Pro plan প্রয়োজন" : f.label;
    b.addEventListener("click",()=>{
      if(isPro){showToast("Pro plan-এ Font ব্যবহার করুন");return;}
      customFontName=null; curFontIdx=i; renderFontPicker(); updatePreview();
    });
    row.appendChild(b);
  });
}

function renderSizePicker(){
  const row = document.getElementById("bc-sizes");
  row.innerHTML = "";
  SIZES.forEach((s,i)=>{
    const b = document.createElement("div");
    b.className = "bc-size-btn" + (i===curSizeIdx?" active":"");
    b.textContent = s;
    b.addEventListener("click",()=>{curSizeIdx=i; renderSizePicker(); showToast(`${s} সাইজ সেট হয়েছে`);});
    row.appendChild(b);
  });
}

["ctrl-main","ctrl-sub","ctrl-name","ctrl-date"].forEach(id=>{
  const el = document.getElementById(id);
  if(el) el.addEventListener("input", ()=>updatePreview());
});

document.getElementById("bc-dl").addEventListener("click",()=>{
  showToast("PNG ডাউনলোড হচ্ছে...");
});

document.getElementById("bc-font-upload").addEventListener("click",()=>{
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".ttf,.otf,.woff,.woff2";
  input.onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const style = document.createElement("style");
      style.textContent = `@font-face{font-family:'${file.name.replace(/\.\w+$/,"")}';src:url('${ev.target.result}')}`;
      document.head.appendChild(style);
      customFontName = `'${file.name.replace(/\.\w+$/,"")}'`;
      curFontIdx = -1;
      renderFontPicker();
      updatePreview();
      showToast(`"${file.name}" আপলোড হয়েছে ✓`);
    };
    reader.readAsDataURL(file);
  };
  input.click();
});

document.getElementById("bc-search").addEventListener("input", (e)=>{
  const q = e.target.value.trim();
  if(!q){
    if(activeSeg) renderGallery(activeSeg);
    return;
  }
  const grid = document.getElementById("bc-grid");
  const title = document.getElementById("bc-cat-title");
  grid.innerHTML = "";
  let count = 0;
  Object.entries(SEGMENTS).forEach(([grp, segs])=>{
    segs.filter(s=>s.label.includes(q)||s.main.includes(q)||grp.includes(q)).forEach(seg=>{
      const t = getTemplates(null, seg)[0];
      const card = document.createElement("div");
      card.className = "bc-tcard";
      const fs = Math.min(12,Math.max(8,Math.floor(22/t.main.length)));
      card.innerHTML = `<div class="bc-tcard-inner" style="background:${t.bg}">
        ${t.arabic?`<div class="bc-tcard-arabic" style="color:${t.accent}">${t.arabic}</div>`:""}
        <div class="bc-tcard-main" style="color:${t.accent};font-size:${fs}px">${t.main}</div>
        <div class="bc-tcard-sub" style="color:#fff;font-size:8px">${t.sub}</div>
        <div class="bc-tcard-hover"><span>সম্পাদনা</span></div>
      </div>`;
      card.addEventListener("click",()=>{activeSeg=seg; selIdx=0; renderGallery(seg); openEditor(t,0);});
      grid.appendChild(card);
      count++;
    });
  });
  title.textContent = `"${q}" — ${count}টি ফলাফল`;
  document.getElementById("bc-cat-count").textContent = `${count} results`;
});

function showToast(msg){
  const t = document.getElementById("bc-toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(t._tm);
  t._tm = setTimeout(()=>t.style.display="none", 2500);
}

buildSidebar();
const firstGrp = Object.values(SEGMENTS)[2];
const firstSeg = firstGrp[0];
const firstEl = document.querySelector('.bc-cat');
if(firstEl){
  document.querySelectorAll(".bc-cat").forEach((el,i)=>{
    if(i===20){ el.classList.add("active"); activeSeg=firstSeg; renderGallery(firstSeg); }
  });
}
</script>
